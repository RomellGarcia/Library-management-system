<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Libro - Biblioteca UTHH</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .form-libro { display: flex; flex-direction: column; gap: 18px; max-width: 700px; margin: 0 auto; }
        .form-libro label { display: block; font-weight: 600; color: #333; margin-bottom: 6px; font-size: 14px; }
        .form-libro input,
        .form-libro textarea,
        .form-libro select { width: 100%; padding: 10px 12px; border: 1.5px solid #ccc; border-radius: 8px; font-size: 15px; font-family: sans-serif; transition: border-color .2s; box-sizing: border-box; }
        .form-libro input:focus,
        .form-libro textarea:focus,
        .form-libro select:focus { outline: none; border-color: #BC955B; box-shadow: 0 0 0 3px rgba(188,149,91,.12); }
        .form-libro input[readonly] { background: #f3f3f3; cursor: not-allowed; color: #888; }
        .form-libro textarea { resize: vertical; min-height: 100px; }
        .preview-imagen { width: 150px; height: 200px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; margin-top: 8px; display: block; }
        .btn-submit { background: #A02142; color: #fff; padding: 12px 30px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .2s; }
        .btn-submit:hover { background: #8a1c38; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        .secondary-button { display: inline-block; background: #718096; color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; }
        .secondary-button:hover { background: #4a5568; }
        .botones-row { display: flex; gap: 14px; margin-top: 8px; }
        #msgResultado { padding: 12px 16px; border-radius: 8px; font-size: 15px; font-weight: 600; margin-top: 10px; display: none; }
        #msgResultado.ok  { background: #d1fae5; color: #065f46; }
        #msgResultado.err { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="pagina-sesion">


    <main class="contenedor-perfil" style="padding: 30px 20px;">
        <a id="btnVolverLibros" href="#" class="boton-volver-detalle">
            <span>←</span>
            <span>Volver a Libros</span>
        </a>
        <script>document.getElementById('btnVolverLibros').href = obtenerRuta('/HTML/listado_libros.html');</script>

        <section class="tarjeta-datos">
            <h2 id="tituloFormulario">Registrar Nuevo Libro</h2>

            <form class="form-libro" id="formLibro" novalidate>
                <!-- Folio -->
                <div>
                    <label for="vchfolio">Folio del Libro <span style="color:#e53e3e">*</span></label>
                    <input type="text" id="vchfolio" name="vchfolio" maxlength="11" required placeholder="Ej: LIB-00001">
                </div>
                <!-- Título -->
                <div>
                    <label for="vchtitulo">Título <span style="color:#e53e3e">*</span></label>
                    <input type="text" id="vchtitulo" name="vchtitulo" maxlength="100" required>
                </div>
                <!-- Autor -->
                <div>
                    <label for="vchautor">Autor <span style="color:#e53e3e">*</span></label>
                    <input type="text" id="vchautor" name="vchautor" maxlength="100" required>
                </div>
                <!-- Editorial -->
                <div>
                    <label for="vcheditorial">Editorial</label>
                    <input type="text" id="vcheditorial" name="vcheditorial" maxlength="100">
                </div>
                <!-- Año -->
                <div>
                    <label for="intanio">Año de Publicación</label>
                    <input type="number" id="intanio" name="intanio" min="1000" max="9999">
                </div>
                <!-- ISBN -->
                <div>
                    <label for="vchisbn">ISBN</label>
                    <input type="text" id="vchisbn" name="vchisbn" maxlength="20">
                </div>
                <!-- Sinopsis -->
                <div>
                    <label for="vchsinopsis">Sinopsis</label>
                    <textarea id="vchsinopsis" name="vchsinopsis" rows="4"></textarea>
                </div>
                <!-- Categoría -->
                <div>
                    <label for="intidcategoria">Categoría</label>
                    <select id="intidcategoria" name="intidcategoria">
                        <option value="">-- Seleccione una categoría --</option>
                    </select>
                </div>
                <!-- Imagen actual (modo edición) -->
                <div id="contenedorImagenActual" style="display:none;">
                    <label>Imagen actual:</label>
                    <img id="imagenActual" class="preview-imagen" src="" alt="Portada actual">
                </div>
                <!-- Imagen nueva -->
                <div>
                    <label for="imagen" id="labelImagen">Imagen del libro <span style="color:#e53e3e" id="asteriscoImagen">*</span></label>
                    <input type="file" id="imagen" name="imagen" accept="image/*">
                    <small id="ayudaImagen" style="color:#718096; display:none;">Deja vacío para conservar la imagen actual.</small>
                    <img id="previewNuevaImagen" class="preview-imagen" style="display:none;" src="" alt="Vista previa">
                </div>

                <div id="msgResultado"></div>

                <div class="botones-row">
                    <button type="submit" class="btn-submit" id="btnGuardar">Añadir Libro</button>
                    <a id="btnCancelar" href="#" class="secondary-button">Cancelar</a>
                    <script>document.getElementById('btnCancelar').href = obtenerRuta('/HTML/listado_libros.html');</script>
                </div>
            </form>
        </section>
    </main>

    <script src="../JS/utils.js"></script>
     <script src="../JS/config.js"></script>
    <script src="../JS/header.js"></script>
    <script src="../JS/footer.js"></script>
    <script src="../JS/protect_route.js"></script>
    <script src="../JS/registrar_libro.js"></script>
    <script src="../JS/session_handler.js"></script>
</body>
</html>
