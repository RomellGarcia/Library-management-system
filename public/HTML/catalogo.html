<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Biblioteca UTHH</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body class="pagina-catalogo">
    <header class="header-search">
        <div class="search-container">
            <input type="search" class="search-box" id="searchBox" placeholder="Buscar libros, autores, categorías..."
                autocomplete="off">
            <div class="search-results" id="searchResults"></div>
        </div>
    </header>

    <!-- CATÁLOGO -->
    <main class="catalogo-container">
        <h1 class="catalogo-titulo">Catálogo de Libros</h1>

        <section class="catalogo-grid" id="catalogoGrid">
            <!-- Los libros se cargarán aquí dinámicamente -->
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando catálogo...</p>
            </div>
        </section>
    </main>


    <!-- SCRIPTS -->
    <script src="../JS/utils.js"></script>
    <script src="../JS/config.js"></script>
    <script src="../JS/header.js"></script>
    <script src="../JS/footer.js"></script>
    <script src="../JS/session_handler.js"></script>
    <script src="../JS/catalogo.js"></script>
</body>

</html>
