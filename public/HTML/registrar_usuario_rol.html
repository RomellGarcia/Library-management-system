<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Biblioteca UTHH</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <main class="contenedor-perfil">
        <section class="tarjeta-datos">
            <h2>Registro de Usuario</h2>

            <div id="mensaje-exito"
                style="display: none; background: #c6f6d5; border: 1px solid #38a169; border-radius: 8px; padding: 20px; margin-bottom: 20px; text-align: center;">
                <h3 style="color: #276749;">¡Registro Exitoso!</h3>
                <p>El usuario ha sido creado correctamente.</p>
                <p>Matrícula asignada: <strong id="matricula-asignada"
                        style="font-size: 1.2rem; color: #A02142;"></strong></p>
                <button type="button" class="boton-accion estilo-guardar" onclick="ocultarMensajeExito()">Volver al
                    registro</button>
            </div>

            <form id="formulario-registro" autocomplete="off" style="display: block;">
                <div class="grupo-campos">
                    <div class="campo-dato">
                        <label for="vchnombre">Nombre: *</label>
                        <input type="text" id="vchnombre" name="vchnombre" placeholder="Nombre(s)" required
                            autocomplete="off">
                    </div>

                    <div class="campo-dato">
                        <label for="vchapaterno">Apellido Paterno: *</label>
                        <input type="text" id="vchapaterno" name="vchapaterno" placeholder="Apellido paterno" required
                            autocomplete="off">
                    </div>

                    <div class="campo-dato">
                        <label for="vchamaterno">Apellido Materno:</label>
                        <input type="text" id="vchamaterno" name="vchamaterno" placeholder="Apellido materno"
                            autocomplete="off">
                    </div>

                    <div class="campo-dato">
                        <label for="vchtelefono">Teléfono: *</label>
                        <input type="tel" id="vchtelefono" name="vchtelefono" placeholder="10 dígitos" maxlength="10"
                            required autocomplete="off">
                    </div>

                    <div class="campo-dato">
                        <label for="vchcorreo">Correo: *</label>
                        <input type="email" id="vchcorreo" name="vchcorreo" placeholder="correo@ejemplo.com" required
                            autocomplete="off">
                    </div>

                    <div class="campo-dato">
                        <label for="vchcalle">Calle:</label>
                        <input type="text" id="vchcalle" name="vchcalle" placeholder="Calle" autocomplete="off">
                    </div>

                    <div class="campo-dato">
                        <label for="vchcolonia">Colonia:</label>
                        <input type="text" id="vchcolonia" name="vchcolonia" placeholder="Colonia" autocomplete="off">
                    </div>

                    <div class="campo-dato">
                        <label for="intidrol">Rol: *</label>
                        <select id="intidrol" name="intidrol" required>
                            <option value="">Seleccione un rol</option>
                            <option value="1">Administrador</option>
                            <option value="2">Empleado</option>
                            <option value="3">Usuario</option>
                        </select>
                    </div>

                    <div class="campo-dato">
                        <label for="vchpassword">Contraseña: *</label>
                        <div class="input-password-container">
                            <input type="password" id="vchpassword" ...>
                            <button type="button" class="toggle-password-btn"
                                onclick="togglePassword('vchpassword', 'eyeIcon1')">
                                <img src="../images/iconos/ojo.png" alt="Mostrar contraseña" id="eyeIcon1">
                            </button>
                        </div>
                    </div>

                    <div class="campo-dato">
                        <label for="confirmar-password">Confirmar Contraseña: *</label>
                        <div class="input-password-container">
                            <input type="password" id="confirmar-password" ...>
                            <button type="button" class="toggle-password-btn"
                                onclick="togglePassword('confirmar-password', 'eyeIcon2')">
                                <img src="../images/iconos/ojo.png" alt="Mostrar contraseña" id="eyeIcon2">
                            </button>
                        </div>
                    </div>
                </div>

                <div class="contenedor-controles">
                    <button type="submit" class="boton-accion estilo-guardar">Registrar</button>
                    <button type="reset" class="boton-accion estilo-cancelar">Limpiar</button>
                </div>
            </form>
        </section>
    </main>

    <!-- SCRIPTS -->
    <script src="../JS/utils.js"></script>
    <script src="../JS/config.js"></script>
    <script src="../JS/header.js"></script>
    <script src="../JS/footer.js"></script>
    <script src="../JS/session_handler.js"></script>
    <script src="../JS/protect_route.js"></script>
    <script src="../JS/registrar_usuarios.js"></script>
</body>

</html>
