<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Biblioteca UTHH</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <main class="contenedor-perfil">
        <section class="tarjeta-datos">
            <h2>Registro de Usuario</h2>

            <div id="mensaje-exito" style="display:none; background:#d4edda; color:#155724; padding:20px; border-radius:8px; margin-bottom:20px; text-align:center;">
                <h3>¡Registro Exitoso!</h3>
                <p>La matrícula asignada es: <strong id="matricula-asignada"></strong></p>
                <button onclick="document.getElementById('mensaje-exito').style.display='none'" class="boton-accion estilo-editar">Entendido</button>
            </div>

            <form id="formulario-registro">
                <div class="grupo-campos">
                    <div class="campo-dato">
                        <label for="vchnombre">Nombre: *</label>
                        <input type="text" id="vchnombre" required>
                    </div>
                    <div class="campo-dato">
                        <label for="vchapaterno">Apellido Paterno: *</label>
                        <input type="text" id="vchapaterno" required>
                    </div>
                    <div class="campo-dato">
                        <label for="vchamaterno">Apellido Materno:</label>
                        <input type="text" id="vchamaterno">
                    </div>
                    <div class="campo-dato">
                        <label for="vchtelefono">Teléfono: *</label>
                        <input type="tel" id="vchtelefono" pattern="[0-9]{10}" placeholder="10 dígitos" required>
                    </div>
                    <div class="campo-dato">
                        <label for="vchcorreo">Correo: *</label>
                        <input type="email" id="vchcorreo" required>
                    </div>
                    <div class="campo-dato">
                        <label for="vchcalle">Calle:</label>
                        <input type="text" id="vchcalle">
                    </div>
                    <div class="campo-dato">
                        <label for="vchcolonia">Colonia:</label>
                        <input type="text" id="vchcolonia">
                    </div>
                    <div class="campo-dato">
                        <label for="intidrol">Rol: *</label>
                        <select id="intidrol" required>
                            <option value="">Seleccione un rol</option>
                            <option value="1">Administrador</option>
                            <option value="2">Empleado</option>
                            <option value="3">Usuario</option>
                        </select>
                    </div>
                    <div class="campo-dato">
                        <label for="vchpassword">Contraseña: *</label>
                        <input type="password" id="vchpassword" minlength="8" required>
                    </div>
                    <div class="campo-dato">
                        <label for="confirmar">Confirmar Contraseña: *</label>
                        <input type="password" id="confirmar" minlength="8" required>
                    </div>
                </div>

                <div class="contenedor-controles">
                    <button type="submit" class="boton-accion estilo-guardar">Registrar</button>
                    <button type="reset" class="boton-accion estilo-cancelar">Limpiar</button>
                </div>
            </form>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="../JS/config.js"></script>
    <script src="../JS/utils.js"></script>
    <script src="../JS/header.js"></script>
    <script src="../JS/footer.js"></script>
    <script src="../JS/session_handler.js"></script>
    <script src="../JS/protect_route.js"></script>
    <script src="../JS/registrar_usuarios.js"></script>
</body>
</html>
